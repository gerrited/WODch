server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security-Header (SECURITY_REVIEW Befund 6): MIME-Sniffing, Clickjacking
    # und XSS per CSP unterbinden. YouTube muss für IFrame-API/Player erlaubt
    # bleiben. TLS/HSTS werden extern von Cloudflare Tunnel abgedeckt.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.youtube.com; frame-src https://www.youtube.com; frame-ancestors 'none'" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Nginx-Kuriosität: add_header in einem Child-Location-Block ersetzt alle
    # vom Server-Block geerbten Header. Deshalb müssen die Security-Header in
    # jedem Location-Block wiederholt werden, der eigenes add_header nutzt.

    location /assets/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.youtube.com; frame-src https://www.youtube.com; frame-ancestors 'none'" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(ico|png|webmanifest)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.youtube.com; frame-src https://www.youtube.com; frame-ancestors 'none'" always;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
