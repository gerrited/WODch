apiVersion: apps/v1
kind: Deployment
metadata:
  name: wodch-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wodch-frontend
  template:
    metadata:
      labels:
        app: wodch-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/gerrited/wodch-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: wodch-frontend
spec:
  selector:
    app: wodch-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wodch-backend
spec:
  # Sessions leben im Arbeitsspeicher — genau eine Instanz.
  # Ausbaupfad bei Bedarf: Redis als Backing Store (siehe docs/rewrite-stack-options.md §6.2)
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wodch-backend
  template:
    metadata:
      labels:
        app: wodch-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: sync
          image: ghcr.io/gerrited/wodch-backend:latest
          ports:
            - containerPort: 8787
          env:
            # AI-Generierung. Secret separat anlegen:
            #   kubectl create secret generic anthropic-secret --from-literal=api-key=sk-ant-...
            # Fehlt der Key, degradiert /generate sauber mit 503 (App läuft weiter).
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-secret
                  key: api-key
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8787
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8787
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: wodch-backend
spec:
  selector:
    app: wodch-backend
  ports:
    - port: 8787
      targetPort: 8787
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wodch
  annotations:
    # WebSocket-Verbindungen lange offen halten
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # X-Forwarded-For komplett überschreiben statt anzuhängen: Clients können dem
    # Header sonst beliebige Einträge voranstellen und das IP-Rate-Limit der
    # KI-Routen aushebeln (SECURITY_REVIEW Befund 2). Setzt voraus, dass dieser
    # Ingress der einzige Proxy vor dem Backend ist (kein CDN/LB davor).
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-For $remote_addr;
spec:
  rules:
    - host: wodch.com
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: wodch-backend
                port:
                  number: 8787
          - path: /generate
            pathType: Prefix
            backend:
              service:
                name: wodch-backend
                port:
                  number: 8787
          - path: /estimate
            pathType: Prefix
            backend:
              service:
                name: wodch-backend
                port:
                  number: 8787
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wodch-frontend
                port:
                  number: 80
    - host: www.wodch.com
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: wodch-backend
                port:
                  number: 8787
          - path: /generate
            pathType: Prefix
            backend:
              service:
                name: wodch-backend
                port:
                  number: 8787
          - path: /estimate
            pathType: Prefix
            backend:
              service:
                name: wodch-backend
                port:
                  number: 8787
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wodch-frontend
                port:
                  number: 80
